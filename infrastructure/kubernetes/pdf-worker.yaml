apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdf-worker
  namespace: ecoeye
  labels:
    app: pdf-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pdf-worker
  template:
    metadata:
      labels:
        app: pdf-worker
    spec:
      containers:
      - name: pdf-worker
        image: docker-pdf-worker:latest
        imagePullPolicy: Never
        command: ["python", "src/worker.py"]
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: ecoeye-data
