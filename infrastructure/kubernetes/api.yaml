apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ecoeye
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: docker-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: ecoeye-secrets
              key: SUPABASE_URL
        - name: SUPABASE_ANON_KEY
          valueFrom:
            secretKeyRef:
              name: ecoeye-secrets
              key: SUPABASE_ANON_KEY
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ecoeye-secrets
              key: GEMINI_API_KEY
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ecoeye
  labels:
    app: api
spec:
  type: NodePort 
  selector:
    app: api
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30800 
    protocol: TCP
